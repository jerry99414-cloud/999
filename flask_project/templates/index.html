{% extends "base.html" %}

{% block title %}系統分類 — 法規查詢系統{% endblock %}

{% block content %}
<div class="card">
  <h2>📂 系統分類</h2>

  {% if sheets %}

    <!-- 🔽 下拉式選單 -->
    <div style="margin-bottom:24px;">
      <p style="color:#718096;font-size:0.9rem;margin-bottom:8px;">
        請選擇要查詢的系統
      </p>

      <form onchange="if(this.system.value) location=this.system.value;">
        <select name="system" style="padding:10px;border-radius:10px;width:100%;">
          <option value="">請選擇系統</option>
          {% for sheet in sheets %}
            <option value="{{ url_for('defects', sheet_name=sheet) }}">
              {{ sheet }}
            </option>
          {% endfor %}
        </select>
      </form>
    </div>

    <!-- 🔹 上傳區 -->
    <div class="upload-box">
      <p style="color:#718096;font-size:0.85rem;margin-bottom:8px;">更換 Excel 檔案</p>
      <form method="POST" enctype="multipart/form-data">
        <input type="file" name="file" accept=".xlsx,.xls">
        <br>
        <button type="submit">上傳新檔案</button>
      </form>
    </div>

  {% else %}

    <p style="color:#718096;margin-bottom:8px;">
      尚未上傳 Excel 檔案。請上傳包含法規資料的 Excel 檔案。
    </p>

    <div class="upload-box">
      <div style="font-size:2rem;margin-bottom:10px;">📄</div>
      <p style="font-weight:600;margin-bottom:4px;">上傳 Excel 法規檔案</p>
      <p style="color:#718096;font-size:0.85rem;margin-bottom:12px;">
        支援 .xlsx / .xls 格式，工作表需包含「缺失項目」與「法規依據」欄位
      </p>
      <form method="POST" enctype="multipart/form-data">
        <input type="file" name="file" accept=".xlsx,.xls" required>
        <br>
        <button type="submit">上傳檔案</button>
      </form>
    </div>

  {% endif %}
</div>
{% endblock %}
